<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>MATH BATTLE — Happy Hour</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#2979ff;--blue-light:#82b1ff;--blue-bg:rgba(41,121,255,0.12);
  --red:#ff1744;--red-light:#ff8a80;--red-bg:rgba(255,23,68,0.12);
  --gold:#ffd600;--green:#00e676;
  --bg:#0a0e1a;--surface:#111827;--surface2:#1c2537;--border:rgba(255,255,255,0.08);
  --mono:'Share Tech Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:#e8eaf0;font-family:'Heebo',sans-serif;direction:rtl;}
#app{max-width:600px;margin:0 auto;padding:16px 16px 40px;}

.header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:20px;}
.logo{font-size:20px;font-weight:900;letter-spacing:-1px;}
.logo .b{color:var(--blue-light);}.logo .r{color:var(--red-light);}
.pill{font-size:11px;padding:4px 12px;border-radius:20px;font-family:var(--mono);}
.pill-wait{background:rgba(255,214,0,.12);color:var(--gold);border:1px solid rgba(255,214,0,.3);}
.pill-live{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.3);}
.pill-end{background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.3);}

.screen{display:none;}.screen.active{display:block;}

/* ── JOIN ── */
.join-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;text-align:center;margin-top:20px;}
.join-card h2{font-size:24px;font-weight:900;margin-bottom:6px;}
.join-card p{color:rgba(255,255,255,.45);font-size:14px;margin-bottom:24px;}
.text-input{width:100%;padding:13px 16px;border-radius:10px;font-size:16px;background:var(--surface2);border:1px solid var(--border);color:#fff;font-family:'Heebo',sans-serif;text-align:center;margin-bottom:14px;outline:none;transition:border .2s;}
.text-input:focus{border-color:var(--gold);}

.team-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.team-btn{padding:18px 12px;border-radius:12px;border:2px solid transparent;cursor:pointer;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;transition:all .15s;background:var(--surface2);}
.team-btn.blue{border-color:var(--blue);color:var(--blue-light);}
.team-btn.blue:hover,.team-btn.blue.sel{background:var(--blue-bg);border-color:var(--blue-light);}
.team-btn.red{border-color:var(--red);color:var(--red-light);}
.team-btn.red:hover,.team-btn.red.sel{background:var(--red-bg);border-color:var(--red-light);}
.team-btn.sel{transform:scale(1.03);}

.btn{padding:13px 24px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:'Heebo',sans-serif;transition:all .15s;width:100%;}
.btn:active{transform:scale(.97);}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:#ffe033;}
.btn-green{background:var(--green);color:#000;}
.btn-red{background:var(--red);color:#fff;}
.btn-outline{background:transparent;color:#fff;border:1px solid var(--border);margin-top:10px;}
.btn-outline:hover{border-color:rgba(255,255,255,.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── WAITING ── */
.scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.team-card{border-radius:14px;padding:18px;text-align:center;border:1px solid transparent;}
.team-card.blue{background:var(--blue-bg);border-color:rgba(41,121,255,.3);}
.team-card.red{background:var(--red-bg);border-color:rgba(255,23,68,.3);}
.team-label{font-size:11px;font-family:var(--mono);letter-spacing:1px;margin-bottom:10px;}
.team-label.blue{color:var(--blue-light);}.team-label.red{color:var(--red-light);}
.team-count{font-size:32px;font-weight:900;margin-bottom:8px;}
.team-count.blue{color:var(--blue-light);}.team-count.red{color:var(--red-light);}
.player-list{font-size:12px;color:rgba(255,255,255,.5);line-height:1.8;min-height:40px;}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;}
.panel-title{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:12px;font-weight:500;letter-spacing:.5px;}
.warn{font-size:13px;color:var(--gold);text-align:center;padding:10px;font-weight:700;}
.share-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.5);margin-bottom:10px;word-break:break-all;cursor:pointer;}
.share-box:hover{border-color:var(--gold);}

/* ── GAME ── */
.timer-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.timer-num{font-family:var(--mono);font-size:24px;color:var(--gold);min-width:48px;}
.prog-track{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;}
.prog-fill{height:100%;border-radius:3px;transition:width .9s linear,background .5s;}

.live-score{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:16px;}
.ls-team{text-align:center;padding:14px 10px;border-radius:12px;border:1px solid transparent;}
.ls-team.blue{background:var(--blue-bg);border-color:rgba(41,121,255,.25);}
.ls-team.red{background:var(--red-bg);border-color:rgba(255,23,68,.25);}
.ls-label{font-size:10px;font-family:var(--mono);letter-spacing:1px;margin-bottom:4px;}
.ls-label.blue{color:var(--blue-light);}.ls-label.red{color:var(--red-light);}
.ls-pts{font-size:36px;font-weight:900;line-height:1;}
.ls-pts.blue{color:var(--blue-light);}.ls-pts.red{color:var(--red-light);}
.vs{font-size:14px;color:rgba(255,255,255,.3);font-family:var(--mono);}

.q-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:28px 24px;text-align:center;margin-bottom:14px;transition:border .3s;}
.q-card.correct{border-color:var(--green);}
.q-card.wrong{border-color:var(--red);}
.q-card.timeout{border-color:rgba(255,255,255,.2);}
.q-label{font-size:11px;font-family:var(--mono);letter-spacing:1px;color:rgba(255,255,255,.4);margin-bottom:10px;}
.q-text{font-size:42px;font-weight:900;margin-bottom:6px;font-family:var(--mono);}
.q-timer{font-size:13px;font-family:var(--mono);margin-bottom:20px;}
.q-timer.urgent{color:var(--red);}
.q-timer.ok{color:rgba(255,255,255,.4);}

.ans-input{width:100%;padding:16px;border-radius:10px;font-size:28px;font-family:var(--mono);background:var(--surface2);border:2px solid var(--border);color:#fff;text-align:center;outline:none;transition:border .2s;-moz-appearance:textfield;}
.ans-input::-webkit-outer-spin-button,.ans-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.ans-input:focus{border-color:var(--gold);}
.submit-btn{margin-top:10px;padding:14px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;border:none;font-family:'Heebo',sans-serif;width:100%;transition:all .15s;}
.submit-btn.blue{background:var(--blue);color:#fff;}
.submit-btn.red{background:var(--red);color:#fff;}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;}

.feedback{font-size:20px;font-weight:700;text-align:center;padding:14px;border-radius:10px;margin-top:10px;}
.feedback.correct{background:rgba(0,230,118,.15);color:var(--green);}
.feedback.wrong{background:rgba(255,23,68,.15);color:var(--red);}
.feedback.timeout{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);}

.my-stats{display:flex;gap:10px;margin-bottom:14px;}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.stat-label{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:3px;}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono);}

/* ── RESULTS ── */
.result-wrap{text-align:center;padding:30px 0;}
.winner-banner{border-radius:16px;padding:28px;margin-bottom:20px;border:2px solid transparent;}
.winner-banner.blue{background:var(--blue-bg);border-color:var(--blue);}
.winner-banner.red{background:var(--red-bg);border-color:var(--red);}
.winner-banner.tie{background:rgba(255,214,0,.08);border-color:var(--gold);}
.winner-emoji{font-size:52px;margin-bottom:8px;}
.winner-title{font-size:26px;font-weight:900;margin-bottom:4px;}
.winner-sub{font-size:14px;color:rgba(255,255,255,.5);}
.final-score{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.fs-card{border-radius:12px;padding:16px;text-align:center;}
.fs-card.blue{background:var(--blue-bg);}
.fs-card.red{background:var(--red-bg);}
.fs-label{font-size:11px;font-family:var(--mono);letter-spacing:1px;margin-bottom:6px;}
.fs-label.blue{color:var(--blue-light);}.fs-label.red{color:var(--red-light);}
.fs-pts{font-size:40px;font-weight:900;}
.fs-pts.blue{color:var(--blue-light);}.fs-pts.red{color:var(--red-light);}

#loadingOverlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;}
.spinner{width:34px;height:34px;border:3px solid rgba(255,214,0,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.next-pulse{animation:pulse .6s ease;}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.4);">מתחבר...</div>
</div>

<div id="app" style="display:none;">
  <div class="header">
    <div class="logo"><span class="b">MATH</span> <span class="r">BATTLE</span> <span style="font-size:12px;font-weight:400;color:rgba(255,255,255,.3);">Happy Hour</span></div>
    <div class="pill pill-wait" id="statusPill">ממתין</div>
  </div>

  <!-- JOIN -->
  <div class="screen active" id="sJoin">
    <div class="join-card">
      <div style="font-size:44px;margin-bottom:12px;">🧮</div>
      <h2>Math Battle</h2>
      <p>הזן שם ובחר קבוצה</p>
      <input class="text-input" id="nameInput" placeholder="השם שלך..." maxlength="16"/>
      <div class="team-pick">
        <button class="team-btn blue" id="btnBlue" onclick="pickTeam('blue')">🔵 קבוצה כחולה</button>
        <button class="team-btn red"  id="btnRed"  onclick="pickTeam('red')">🔴 קבוצה אדומה</button>
      </div>
      <button class="btn btn-gold" id="joinBtn" onclick="joinGame()" disabled>הצטרף</button>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
        <div style="font-size:12px;color:rgba(255,255,255,.3);margin-bottom:8px;">מנהל המשחק?</div>
        <button class="btn btn-outline" onclick="joinAsAdmin()">כניסה כמנהל</button>
      </div>
    </div>
  </div>

  <!-- WAITING -->
  <div class="screen" id="sWait">
    <div class="scoreboard">
      <div class="team-card blue">
        <div class="team-label blue">TEAM BLUE 🔵</div>
        <div class="team-count blue" id="blueCount">0</div>
        <div class="player-list" id="bluePlayers"></div>
      </div>
      <div class="team-card red">
        <div class="team-label red">TEAM RED 🔴</div>
        <div class="team-count red" id="redCount">0</div>
        <div class="player-list" id="redPlayers"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">מנהל</div>
      <div class="share-box" id="shareUrl" onclick="copyLink()"></div>
      <div id="balanceWarn" class="warn" style="display:none;"></div>
      <div id="adminArea"></div>
      <div id="waitMsg" style="font-size:13px;color:rgba(255,255,255,.35);text-align:center;margin-top:8px;"></div>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen" id="sGame">
    <div class="timer-row">
      <div class="timer-num" id="timerDisp">2:00</div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:100%;background:var(--gold);"></div></div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);font-family:var(--mono);" id="roundDisp"></div>
    </div>

    <div class="live-score">
      <div class="ls-team blue">
        <div class="ls-label blue">BLUE 🔵</div>
        <div class="ls-pts blue" id="bluePts">0</div>
      </div>
      <div class="vs">VS</div>
      <div class="ls-team red">
        <div class="ls-label red">RED 🔴</div>
        <div class="ls-pts red" id="redPts">0</div>
      </div>
    </div>

    <div class="my-stats">
      <div class="stat-box"><div class="stat-label">✓ נכון</div><div class="stat-val" id="myCorrect" style="color:var(--green);">0</div></div>
      <div class="stat-box"><div class="stat-label">✗ טעות</div><div class="stat-val" id="myWrong" style="color:var(--red);">0</div></div>
      <div class="stat-box"><div class="stat-label">⏱ פג זמן</div><div class="stat-val" id="myTimeout" style="color:rgba(255,255,255,.4);">0</div></div>
    </div>

    <div class="q-card" id="qCard">
      <div class="q-label">שאלה</div>
      <div class="q-text" id="qText">?</div>
      <div class="q-timer ok" id="qTimer">6 שניות</div>
      <input class="ans-input" id="ansInput" type="number" placeholder="התשובה..." autocomplete="off"/>
      <button class="submit-btn blue" id="submitBtn" onclick="submitAnswer()">שלח ✓</button>
      <div class="feedback" id="feedback" style="display:none;"></div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="sResult">
    <div class="result-wrap">
      <div class="winner-banner" id="winnerBanner">
        <div class="winner-emoji" id="winnerEmoji"></div>
        <div class="winner-title" id="winnerTitle"></div>
        <div class="winner-sub" id="winnerSub"></div>
      </div>
      <div class="final-score">
        <div class="fs-card blue"><div class="fs-label blue">BLUE 🔵</div><div class="fs-pts blue" id="resBluePts">0</div></div>
        <div class="fs-card red"><div class="fs-label red">RED 🔴</div><div class="fs-pts red" id="resRedPts">0</div></div>
      </div>
      <div id="adminRestartArea"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBYpYUf6f41A1F4FX1YHllLQVCVlH1XzM",
  authDomain: "stock-4d6fd.firebaseapp.com",
  databaseURL: "https://stock-4d6fd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "stock-4d6fd",
  storageBucket: "stock-4d6fd.firebasestorage.app",
  messagingSenderId: "770000973719",
  appId: "1:770000973719:web:89505dcdfeab8d68549ed2"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const ROOM = "mathbattle1";
const TOTAL_SECS = 120;

/* ── refs ── */
const rGame    = ()=>ref(db,`${ROOM}/game`);
const rPlayers = ()=>ref(db,`${ROOM}/players`);
const rPlayer  = n=>ref(db,`${ROOM}/players/${n}`);
const rScore   = ()=>ref(db,`${ROOM}/score`);

/* ── local state ── */
let myName='', myTeam='', isAdmin=false;
let myCorrect=0, myWrong=0, myTimeout=0;
let qSecs=0, qInterval=null, timerInterval=null;
let currentQ=null, answered=false;
let gameSecsLeft=TOTAL_SECS;
let allPlayers={};

/* ── question generator ── */
function genQuestion(){
  const ops=['+','-','×'];
  const op=ops[Math.floor(Math.random()*ops.length)];
  let a,b,ans,text;
  if(op==='×'){
    a=Math.floor(Math.random()*9)+2;
    b=Math.floor(Math.random()*9)+2;
    ans=a*b; text=`${a} × ${b}`;
  } else if(op==='+'){
    a=Math.floor(Math.random()*50)+10;
    b=Math.floor(Math.random()*50)+10;
    ans=a+b; text=`${a} + ${b}`;
  } else {
    a=Math.floor(Math.random()*50)+20;
    b=Math.floor(Math.random()*19)+1;
    if(b>a)b=a-1;
    ans=a-b; text=`${a} - ${b}`;
  }
  return {text:`${text} = ?`, ans};
}

/* ── helpers ── */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setPill(t,c){const p=document.getElementById('statusPill');p.textContent=t;p.className='pill '+c;}
function copyLink(){navigator.clipboard.writeText(location.href).then(()=>{document.getElementById('shareUrl').textContent='✓ הועתק!';setTimeout(()=>document.getElementById('shareUrl').textContent=location.href,1500);});}

/* ── team pick ── */
window.pickTeam = function(team){
  myTeam=team;
  document.getElementById('btnBlue').classList.toggle('sel',team==='blue');
  document.getElementById('btnRed').classList.toggle('sel',team==='red');
  checkJoinReady();
};

function checkJoinReady(){
  const name=document.getElementById('nameInput').value.trim();
  document.getElementById('joinBtn').disabled=!(name&&myTeam);
}
document.getElementById('nameInput').addEventListener('input',checkJoinReady);
document.getElementById('nameInput').addEventListener('keypress',e=>{if(e.key==='Enter'&&!document.getElementById('joinBtn').disabled)joinGame();});
document.getElementById('ansInput').addEventListener('keypress',e=>{if(e.key==='Enter')submitAnswer();});

/* ── JOIN ── */
window.joinGame = async function(){
  const n=document.getElementById('nameInput').value.trim();
  if(!n||!myTeam)return;
  myName=n;
  const snap=await get(rGame());
  const g=snap.val()||{};
  if(g.phase==='playing'){await registerPlayer();startGameUI();return;}
  if(g.phase==='ended'){goResult();return;}
  await registerPlayer();
  goWaiting();
};

window.joinAsAdmin = async function(){
  myName='מנהל'; isAdmin=true; myTeam='blue';
  const snap=await get(rGame());
  const g=snap.val()||{};
  if(g.phase==='playing'){startGameUI();return;}
  if(g.phase==='ended'){goResult();return;}
  goWaiting();
};

async function registerPlayer(){
  const snap=await get(rPlayer(myName));
  if(!snap.exists()){
    await set(rPlayer(myName),{team:myTeam,correct:0,wrong:0,timeout:0,joined:Date.now()});
  }
}

/* ── WAITING ── */
function goWaiting(){
  show('sWait'); setPill('ממתין לשחקנים','pill-wait');
  document.getElementById('shareUrl').textContent=location.href;
  if(isAdmin){
    document.getElementById('adminArea').innerHTML=
      `<button class="btn btn-green" onclick="startGame()" id="startBtn">🚀 התחל משחק</button>
       <button class="btn btn-outline" onclick="resetGame()" style="margin-top:8px;">🗑 אפס הכל</button>`;
  } else {
    document.getElementById('waitMsg').textContent='ממתין למנהל שיתחיל...';
  }

  onValue(rPlayers(), snap=>{
    allPlayers=snap.val()||{};
    refreshTeams();
  });
  onValue(rGame(), snap=>{
    const g=snap.val()||{};
    if(g.phase==='playing' && !isAdmin){startGameUI();}
    if(g.phase==='ended'){goResult();}
  });
}

function refreshTeams(){
  const blues=Object.entries(allPlayers).filter(([,p])=>p.team==='blue');
  const reds =Object.entries(allPlayers).filter(([,p])=>p.team==='red');
  document.getElementById('blueCount').textContent=blues.length;
  document.getElementById('redCount').textContent=reds.length;
  document.getElementById('bluePlayers').textContent=blues.map(([n])=>n).join(', ');
  document.getElementById('redPlayers').textContent=reds.map(([n])=>n).join(', ');

  const diff=Math.abs(blues.length-reds.length);
  const warn=document.getElementById('balanceWarn');
  const startBtn=document.getElementById('startBtn');
  if(blues.length===0||reds.length===0){
    warn.style.display='block';
    warn.textContent='⚠ צריך שחקנים בשתי הקבוצות';
    if(startBtn)startBtn.disabled=true;
  } else if(diff>1){
    warn.style.display='block';
    warn.textContent=`⚠ הפרש של ${diff} שחקנים — המשחק יתחיל רק עם הפרש של 0 או 1`;
    if(startBtn)startBtn.disabled=true;
  } else {
    warn.style.display='none';
    if(startBtn)startBtn.disabled=false;
  }
}

/* ── START ── */
window.startGame = async function(){
  await set(rScore(),{blue:0,red:0});
  await set(rGame(),{phase:'playing',secsLeft:TOTAL_SECS,startedAt:Date.now()});
  startGameUI();
};

/* ── GAME UI ── */
function startGameUI(){
  show('sGame'); setPill('משחק פעיל','pill-live');

  /* my team color */
  const myT = myTeam||'blue';
  document.getElementById('submitBtn').className=`submit-btn ${myT}`;

  /* listen score */
  onValue(rScore(), snap=>{
    const s=snap.val()||{blue:0,red:0};
    document.getElementById('bluePts').textContent=s.blue;
    document.getElementById('redPts').textContent=s.red;
  });

  /* listen game timer (admin drives it) */
  onValue(rGame(), snap=>{
    const g=snap.val()||{};
    gameSecsLeft=g.secsLeft??TOTAL_SECS;
    updateTimerUI();
    if(g.phase==='ended'){
      clearInterval(timerInterval);
      goResult();
    }
  });

  /* admin drives the global timer */
  if(isAdmin){
    timerInterval=setInterval(async()=>{
      const snap=await get(rGame());
      const g=snap.val()||{};
      if(g.phase!=='playing')return;
      const left=(g.secsLeft??TOTAL_SECS)-1;
      if(left<=0){
        clearInterval(timerInterval);
        await update(rGame(),{phase:'ended',secsLeft:0});
        return;
      }
      await update(rGame(),{secsLeft:left});
    },1000);
  }

  nextQuestion();
}

function updateTimerUI(){
  const m=Math.floor(gameSecsLeft/60), s=gameSecsLeft%60;
  document.getElementById('timerDisp').textContent=`${m}:${String(s).padStart(2,'0')}`;
  const pct=(gameSecsLeft/TOTAL_SECS)*100;
  const fill=document.getElementById('progFill');
  fill.style.width=pct+'%';
  fill.style.background=pct>30?'var(--gold)':'var(--red)';
}

/* ── QUESTION ── */
function nextQuestion(){
  currentQ=genQuestion();
  answered=false;
  qSecs=6;

  const card=document.getElementById('qCard');
  card.className='q-card next-pulse';
  setTimeout(()=>card.classList.remove('next-pulse'),600);

  document.getElementById('qText').textContent=currentQ.text;
  document.getElementById('ansInput').value='';
  document.getElementById('ansInput').disabled=false;
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('feedback').style.display='none';
  updateQTimer();

  if(qInterval)clearInterval(qInterval);
  qInterval=setInterval(()=>{
    qSecs--;
    updateQTimer();
    if(qSecs<=0){
      clearInterval(qInterval);
      handleTimeout();
    }
  },1000);

  setTimeout(()=>document.getElementById('ansInput').focus(),100);
}

function updateQTimer(){
  const el=document.getElementById('qTimer');
  el.textContent=`${qSecs} שניות`;
  el.className=qSecs<=2?'q-timer urgent':'q-timer ok';
}

window.submitAnswer = function(){
  if(answered)return;
  const val=parseInt(document.getElementById('ansInput').value);
  if(isNaN(val))return;
  clearInterval(qInterval);
  answered=true;
  document.getElementById('ansInput').disabled=true;
  document.getElementById('submitBtn').disabled=true;

  const correct=(val===currentQ.ans);
  if(correct){
    myCorrect++;
    showFeedback('correct','✓ נכון! +1 לקבוצה');
    updateScore(myTeam,1);
    update(rPlayer(myName),{correct:myCorrect});
  } else {
    myWrong++;
    showFeedback('wrong',`✗ טעות! התשובה: ${currentQ.ans} | -1 לקבוצה`);
    updateScore(myTeam,-1);
    update(rPlayer(myName),{wrong:myWrong});
  }
  document.getElementById('myCorrect').textContent=myCorrect;
  document.getElementById('myWrong').textContent=myWrong;
  setTimeout(nextQuestion,1800);
};

function handleTimeout(){
  if(answered)return;
  answered=true;
  myTimeout++;
  document.getElementById('ansInput').disabled=true;
  document.getElementById('submitBtn').disabled=true;
  showFeedback('timeout',`⏱ פג הזמן! התשובה: ${currentQ.ans}`);
  document.getElementById('myTimeout').textContent=myTimeout;
  update(rPlayer(myName),{timeout:myTimeout});
  setTimeout(nextQuestion,1800);
}

function showFeedback(type,msg){
  const fb=document.getElementById('feedback');
  fb.className=`feedback ${type}`;
  fb.textContent=msg;
  fb.style.display='block';
  document.getElementById('qCard').className=`q-card ${type}`;
}

async function updateScore(team,delta){
  const snap=await get(rScore());
  const s=snap.val()||{blue:0,red:0};
  s[team]=Math.max(0,(s[team]||0)+delta);
  await set(rScore(),s);
}

/* ── RESULTS ── */
function goResult(){
  if(qInterval)clearInterval(qInterval);
  if(timerInterval)clearInterval(timerInterval);
  show('sResult'); setPill('המשחק הסתיים','pill-end');

  onValue(rScore(), snap=>{
    const s=snap.val()||{blue:0,red:0};
    document.getElementById('resBluePts').textContent=s.blue;
    document.getElementById('resRedPts').textContent=s.red;

    const banner=document.getElementById('winnerBanner');
    const emoji=document.getElementById('winnerEmoji');
    const title=document.getElementById('winnerTitle');
    const sub=document.getElementById('winnerSub');

    if(s.blue>s.red){
      banner.className='winner-banner blue';
      emoji.textContent='🔵🏆';
      title.textContent='קבוצה כחולה ניצחה!';
      sub.textContent=`${s.blue} נקודות מול ${s.red}`;
    } else if(s.red>s.blue){
      banner.className='winner-banner red';
      emoji.textContent='🔴🏆';
      title.textContent='קבוצה אדומה ניצחה!';
      sub.textContent=`${s.red} נקודות מול ${s.blue}`;
    } else {
      banner.className='winner-banner tie';
      emoji.textContent='🤝';
      title.textContent='תיקו!';
      sub.textContent=`${s.blue} נקודות לכל קבוצה`;
    }
  });

  if(isAdmin){
    document.getElementById('adminRestartArea').innerHTML=
      `<button class="btn btn-gold" onclick="resetGame()" style="margin-top:8px;">🔄 משחק חדש</button>`;
  }
}

window.resetGame = async function(){
  if(!confirm('לאפס את המשחק?'))return;
  if(qInterval)clearInterval(qInterval);
  if(timerInterval)clearInterval(timerInterval);
  await remove(ref(db,ROOM));
  location.reload();
};

/* ── INIT ── */
async function init(){
  document.getElementById('loadingOverlay').style.display='none';
  document.getElementById('app').style.display='block';
  const snap=await get(rGame());
  const g=snap.val()||{};
  if(g.phase==='playing')document.getElementById('nameInput').placeholder='המשחק כבר פעיל...';
}
init();
</script>
</body>
</html>
